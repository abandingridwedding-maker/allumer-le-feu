<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Allumer le FEU — Coach Screen</title>
<link rel="stylesheet" href="style.css" />
</head>
<body class="coach">
  <div id="topbar">
    <div class="brand">🔥 ALLUMER LE FEU</div>
    <div class="tools">
      <button id="qrBtn">QR Codes</button>
      <button id="freezeBtn">Freeze</button>
      <button id="gridBtn">Grid On/Off</button>
      <button id="resetBtn">Reset</button>
      <label>Speed <input id="speed" type="range" min="1" max="9" step="0.2" value="4.2" /></label>
    </div>
  </div>

  <canvas id="field" width="1400" height="820"></canvas>

  <div id="qrModal" class="modal hidden">
    <div class="modalCard">
      <div class="modalHeader">
        <h2>Scan to control players</h2>
        <button id="closeQr">Close</button>
      </div>
      <div id="qrGrid"></div>
    </div>
  </div>

<script src="/socket.io/socket.io.js"></script>
<script src="coach.js"></script>
</body>
</html>
