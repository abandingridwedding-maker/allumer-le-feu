<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TEAM-CLARITY V2</title>

  <link rel="stylesheet" href="/style.css" />

  <script src="/socket.io/socket.io.js"></script>
</head>

<body>
  <div id="app" class="app-shell">

    <header class="top-bar">
      <div class="brand-block">
        <div class="brand-icon">🔥</div>
        <div>
          <h1>TEAM-CLARITY</h1>
          <p>Live rugby clarity simulator</p>
        </div>
      </div>

      <div class="top-actions">
        <button id="coachModeBtn" class="tc-btn active">Coach</button>
        <button id="playerModeBtn" class="tc-btn">Player</button>
      </div>
    </header>

    <main class="main-layout">

      <section class="field-section">
        <canvas id="fieldCanvas"></canvas>

        <div id="fieldOverlay" class="field-overlay">
          <div id="sessionBadge" class="session-badge">
            Session: <span id="sessionCodeText">----</span>
          </div>
        </div>
      </section>

      <aside class="control-panel">

        <section class="panel-card">
          <h2>Session</h2>

          <div class="session-box">
            <div id="qrCodeBox" class="qr-box">
              <span>QR</span>
            </div>

            <div class="session-info">
              <p>Players scan to join this live session.</p>
              <button id="copySessionBtn" class="tc-btn full">Copy Link</button>
            </div>
          </div>
        </section>

        <section class="panel-card">
          <h2>Coach Controls</h2>

          <div class="control-grid">
            <button id="lineoutBtn" class="tc-btn">Lineout</button>
            <button id="scrumBtn" class="tc-btn">Scrum</button>
            <button id="resetBtn" class="tc-btn">Reset</button>
            <button id="freezeBtn" class="tc-btn">Freeze</button>
          </div>

          <div class="control-row">
            <label>Attack Direction</label>
            <select id="attackDirectionSelect">
              <option value="right-to-left">Right → Left</option>
              <option value="left-to-right">Left → Right</option>
            </select>
          </div>

          <div class="control-row">
            <label>Player Size</label>
            <select id="playerSizeSelect">
              <option value="large">Full Size</option>
              <option value="medium">2/3 Size</option>
              <option value="small">1/2 Size</option>
            </select>
          </div>

          <div class="control-row">
            <label>Kit Colour</label>
            <select id="teamColorSelect">
              <option value="red">Red</option>
              <option value="black">Black</option>
              <option value="white">White</option>
              <option value="blue">Blue</option>
              <option value="green">Green</option>
            </select>
          </div>
        </section>

        <section class="panel-card">
          <h2>Play Simulator</h2>

          <div id="simulatorPanel" class="simulator-panel">
            <div class="simulator-card">
              <div class="simulator-title">No play loaded</div>
              <div class="simulator-progress">
                <div class="simulator-progress-bar" style="width:0%"></div>
              </div>
              <div class="simulator-meta">
                <span>0%</span>
                <span>Speed: 1x</span>
              </div>
              <div class="simulator-score">No score yet</div>
            </div>
          </div>

          <div class="control-grid">
            <button id="simStartBtn" class="tc-btn">Start</button>
            <button id="simPauseBtn" class="tc-btn">Pause</button>
            <button id="simResetBtn" class="tc-btn">Reset Sim</button>
          </div>

          <div class="control-row">
            <label>Role</label>
            <select id="simRoleSelect">
              <option value="">Select role</option>
              <option value="1">1</option>
              <option value="2">2</option>
              <option value="3">3</option>
              <option value="4">4</option>
              <option value="5">5</option>
              <option value="6">6</option>
              <option value="7">7</option>
              <option value="8">8</option>
              <option value="9">9</option>
              <option value="10">10</option>
              <option value="11">11</option>
              <option value="12">12</option>
              <option value="13">13</option>
              <option value="14">14</option>
              <option value="15">15</option>
            </select>
          </div>

          <div class="control-row">
            <label>Speed</label>
            <select id="simSpeedSelect">
              <option value="0.5">0.5x</option>
              <option value="1" selected>1x</option>
              <option value="1.5">1.5x</option>
              <option value="2">2x</option>
            </select>
          </div>
        </section>

      </aside>
    </main>

    <section id="playerJoinPanel" class="player-join-panel hidden">
      <div class="join-card">
        <h2>Join TEAM-CLARITY</h2>
        <p>Select your player number and connect to the live coach session.</p>

        <select id="playerNumberSelect">
          <option value="">Select number</option>
          <option value="1">1</option>
          <option value="2">2</option>
          <option value="3">3</option>
          <option value="4">4</option>
          <option value="5">5</option>
          <option value="6">6</option>
          <option value="7">7</option>
          <option value="8">8</option>
          <option value="9">9</option>
          <option value="10">10</option>
          <option value="11">11</option>
          <option value="12">12</option>
          <option value="13">13</option>
          <option value="14">14</option>
          <option value="15">15</option>
        </select>

        <button id="joinSessionBtn" class="tc-btn full">Join Session</button>
      </div>
    </section>

  </div>

  <script>
    window.socket = io();

    window.TEAM_CLARITY_CONFIG = {
      version: "v2",
      defaultDirection: "right-to-left",
      fieldMode: "rugby",
      normalizedCoordinates: true
    };
  </script>

  <script src="/coach.js"></script>
  <script src="/playsimulator.js"></script>

</body>
</html>
