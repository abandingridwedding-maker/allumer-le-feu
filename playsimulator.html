<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TEAM-CLARITY — Player Simulator</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <div id="topbar">
    <div class="brand">🏃 PLAYER SIMULATOR</div>

    <div class="tools">
      <div class="toolGroup">
        <button onclick="window.location.href='index.html'">Home</button>
        <button id="loadPlayBtn">📂 Choose Play</button>
        <button id="qrBtn">QR Codes</button>
        <button id="startSimBtn">Start Rep</button>
        <button id="resetSimBtn">Reset</button>
        <button id="logsBtn">Training Log</button>
      </div>

      <div class="toolGroup">
        <label>
          Player:
          <select id="playerNumber">
            <option value="1">1</option>
            <option value="2">2</option>
            <option value="3">3</option>
            <option value="4">4</option>
            <option value="5">5</option>
            <option value="6">6</option>
            <option value="7" selected>7</option>
            <option value="8">8</option>
            <option value="9">9</option>
            <option value="10">10</option>
            <option value="11">11</option>
            <option value="12">12</option>
            <option value="13">13</option>
            <option value="14">14</option>
            <option value="15">15</option>
          </select>
        </label>

        <select id="playerSize">
          <option value="normal">Normal Size</option>
          <option value="medium">2/3 Size</option>
          <option value="small">Small Circle</option>
        </select>

        <label class="speedLabel">
          Sim Speed
          <input id="simSpeed" type="range" min="0.25" max="2" step="0.25" value="0.5" />
          <span id="simSpeedValue">0.5x</span>
        </label>

        <label class="speedLabel">
          Shadow Guide
          <input id="shadowGuideToggle" type="checkbox" checked />
        </label>
      </div>
    </div>
  </div>

  <div id="pitchWrapper">
    <canvas id="field" width="1600" height="900"></canvas>
    <div id="lineoutNotesPanel" class="hidden">
      <div class="notesTitle">📋 Lineout Notes</div>
      <textarea id="lineoutNotes" placeholder="Lineout notes loaded from play..."></textarea>
    </div>
  </div>

  <div id="playModal" class="modal hidden">
    <div class="modalCard">
      <div class="modalHeader">
        <h2>📂 Choose Saved Play</h2>
        <button id="closePlayModal">Close</button>
      </div>
      <div id="savedPlaysList"></div>
    </div>
  </div>

  <div id="qrModal" class="modal hidden">
    <div class="modalCard">
      <div class="modalHeader">
        <h2>Scan To Control Players</h2>
        <button id="closeQr">Close</button>
      </div>
      <div id="qrGrid"></div>
    </div>
  </div>

  <div id="scoreModal" class="modal hidden">
    <div class="modalCard">
      <div class="modalHeader">
        <h2>Rep Score</h2>
        <button id="closeScoreModal">Close</button>
      </div>
      <div id="scoreResult"></div>
    </div>
  </div>

  <div id="logsModal" class="modal hidden">
    <div class="modalCard">
      <div class="modalHeader">
        <h2>Training Log</h2>
        <button id="closeLogsModal">Close</button>
      </div>
      <div id="logsList"></div>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="playsimulator.js"></script>
<script type="module">
  import { supabase } from './supabase.js'

  const {
    data: { session }
  } = await supabase.auth.getSession()

  if (!session) {
    window.location.href = 'auth.html'
  }
</script>

</body>
</html>
