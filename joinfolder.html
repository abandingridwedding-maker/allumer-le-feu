<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TEAM-CLARITY | Join Folder</title>

  <script type="module">
    import { supabase } from './supabase.js'

    async function joinFolder() {
      const code = document.getElementById("shareCode").value.trim().toUpperCase()

      if (!code) {
        alert("Enter a folder code.")
        return
      }

      const {
        data: { user }
      } = await supabase.auth.getUser()

      if (!user) {
        window.location.href = "auth.html"
        return
      }

      const { data: folder, error: folderError } = await supabase
        .from("folders")
        .select("*")
        .eq("share_code", code)
        .single()

      if (folderError || !folder) {
        alert("Folder not found.")
        return
      }

      const { error: joinError } = await supabase
        .from("folder_members")
        .insert({
          folder_id: folder.id,
          player_id: user.id
        })

      if (joinError && !joinError.message.includes("duplicate")) {
        alert(joinError.message)
        return
      }

      alert("Folder joined successfully.")

      window.location.href = "playsimulator.html"
    }

    window.joinFolder = joinFolder
  </script>

  <style>
    body {
      margin: 0;
      background: #111;
      font-family: Courier New;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .box {
      background: #1a1a1a;
      border: 4px solid #d71920;
      padding: 40px;
      width: 420px;
      text-align: center;
      box-shadow: 0 0 40px rgba(0,0,0,.5);
    }

    h1 {
      color: #ffd700;
      margin-bottom: 30px;
      font-size: 34px;
    }

    input {
      width: 100%;
      padding: 16px;
      font-size: 22px;
      text-transform: uppercase;
      text-align: center;
      background: #111;
      border: 3px solid #fff;
      color: #fff;
      margin-bottom: 25px;
      box-sizing: border-box;
    }

    button {
      width: 100%;
      padding: 16px;
      font-size: 22px;
      font-weight: 900;
      cursor: pointer;
      background: #d71920;
      color: white;
      border: none;
    }

    button:hover {
      background: #ff2e38;
    }
  </style>
</head>

<body>

  <div class="box">
    <h1>JOIN TEAM FOLDER</h1>

    <input
      id="shareCode"
      placeholder="ENTER SHARE CODE"
    />

    <button onclick="joinFolder()">
      JOIN FOLDER
    </button>
  </div>

</body>
</html>
