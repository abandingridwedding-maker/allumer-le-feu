<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TEAM-CLARITY — Play Builder</title>
  <link rel="stylesheet" href="style.css" />

  <style>
    body {
      margin: 0;
      background: #111;
      color: white;
      font-family: "Courier New", monospace;
      overflow: hidden;
    }

    .tc-header {
      height: auto;
      min-height: 76px;
      background: #e3131b;
      border-bottom: 6px solid #111;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 10px 14px;
      box-sizing: border-box;
      flex-wrap: wrap;
    }

    .tc-title {
      font-size: 26px;
      font-weight: 900;
      color: white;
      text-shadow: 3px 3px #111;
      white-space: nowrap;
    }

    .tc-controls {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }

    .tc-btn, .tc-input, .tc-select {
      background: #111;
      color: white;
      border: 3px solid white;
      border-radius: 8px;
      padding: 9px 12px;
      font-family: "Courier New", monospace;
      font-weight: 900;
      box-shadow: 3px 3px 0 #000;
    }

    .tc-btn {
      cursor: pointer;
    }

    .tc-btn:hover {
      transform: translateY(-1px);
      background: #222;
    }

    .tc-input {
      min-width: 160px;
    }

    #playField {
      position: relative;
      width: 100vw;
      height: calc(100vh - 118px);
      background: #68c35a;
      overflow: hidden;
    }

    .field-inner {
      position: absolute;
      left: 5%;
      top: 5%;
      width: 90%;
      height: 82%;
      border: 6px solid white;
      box-sizing: border-box;
      opacity: 0.95;
    }

    .field-line {
      position: absolute;
      background: white;
      opacity: 0.95;
    }

    .vline { width: 5px; height: 100%; top: 0; }
    .hline { height: 5px; width: 100%; left: 0; }

    .dash-v {
      position: absolute;
      top: 0;
      height: 100%;
      border-left: 5px dashed white;
      opacity: 0.95;
    }

    .dash-h {
      position: absolute;
      left: 0;
      width: 100%;
      border-top: 5px dashed white;
      opacity: 0.95;
    }

    .player {
      position: absolute;
      width: 42px;
      height: 54px;
      cursor: grab;
      z-index: 20;
      user-select: none;
      transition: none;
    }

    .player-head {
      width: 20px;
      height: 16px;
      background: #b87945;
      border: 3px solid #111;
      margin: 0 auto;
      box-sizing: border-box;
    }

    .player-body {
      width: 34px;
      height: 30px;
      background: #d71920;
      border: 3px solid #111;
      margin: -1px auto 0;
      box-sizing: border-box;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #111;
      font-weight: 900;
      font-size: 16px;
    }

    .player-number {
      background: white;
      border: 2px solid #111;
      padding: 0 4px;
      line-height: 17px;
      min-width: 16px;
      text-align: center;
    }

    .player-legs {
      width: 26px;
      height: 9px;
      margin: 0 auto;
      display: flex;
      justify-content: space-between;
    }

    .player-legs span {
      width: 8px;
      height: 11px;
      background: #111;
      display: block;
    }

    .ball {
      position: absolute;
      width: 22px;
      height: 22px;
      background: #ffd84a;
      border-radius: 50%;
      border: 3px solid #111;
      z-index: 30;
      cursor: grab;
      user-select: none;
    }

    #movementLayer {
      position: absolute;
      inset: 0;
      z-index: 5;
      pointer-events: none;
    }

    .bottom-info {
      height: 42px;
      background: #222;
      border-top: 5px solid #111;
      color: white;
      display: flex;
      align-items: center;
      padding: 0 12px;
      font-size: 13px;
      font-weight: 900;
      box-sizing: border-box;
      gap: 18px;
      flex-wrap: wrap;
    }

    .yellow {
      color: #ffd84a;
    }

    @media (max-width: 900px) {
      .tc-title {
        font-size: 18px;
      }

      .tc-btn, .tc-input, .tc-select {
        padding: 7px 8px;
        font-size: 12px;
      }

      .player {
        transform: scale(0.82);
        transform-origin: top left;
      }

      #playField {
        height: calc(100vh - 150px);
      }
    }
  </style>
</head>

<body>
  <div class="tc-header">
    <div class="tc-title">🔥 TEAM-CLARITY — PLAY BUILDER</div>

    <div class="tc-controls">
      <input id="playName" class="tc-input" placeholder="Play name" />

      <select id="playType" class="tc-select">
        <option value="Lineout">Lineout</option>
        <option value="Scrum">Scrum</option>
        <option value="General Play">General Play</option>
      </select>

      <button class="tc-btn" onclick="setStartingShape()">Set Shape</button>
      <button class="tc-btn" onclick="addStep()">Add Step</button>
      <button class="tc-btn" onclick="playAnimation()">Play</button>
      <button class="tc-btn" onclick="resetToStep(0)">Reset</button>
      <button class="tc-btn" onclick="savePlay()">Save</button>
      <button class="tc-btn" onclick="loadPlay()">Load</button>
      <button class="tc-btn" onclick="window.location.href='controller.html'">Back</button>
    </div>
  </div>

  <div id="playField">
    <svg id="movementLayer"></svg>

    <div class="field-inner">
      <div class="field-line vline" style="left: 6%;"></div>
      <div class="field-line vline" style="left: 26%;"></div>
      <div class="field-line vline" style="left: 50%;"></div>
      <div class="field-line vline" style="left: 74%;"></div>
      <div class="field-line vline" style="left: 94%;"></div>

      <div class="dash-v" style="left: 10%;"></div>
      <div class="dash-v" style="left: 40%;"></div>
      <div class="dash-v" style="left: 60%;"></div>
      <div class="dash-v" style="left: 90%;"></div>

      <div class="dash-h" style="top: 8%;"></div>
      <div class="dash-h" style="top: 24%;"></div>
      <div class="dash-h" style="top: 76%;"></div>
      <div class="dash-h" style="top: 92%;"></div>
    </div>
  </div>

  <div class="bottom-info">
    <span class="yellow">FREE PLAY BUILDER MODE</span>
    <span>Step: <span id="stepCount">0</span></span>
    <span>Drag players + ball → Add Step → Play</span>
    <span>Save/Load works locally for now</span>
  </div>

  <script src="playbuilder.js"></script>
</body>
</html>
