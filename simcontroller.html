<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>TEAM-CLARITY — Simulator Controller</title>
  <style>
    * { box-sizing: border-box; touch-action: none; }

    body {
      margin: 0;
      min-height: 100vh;
      background: #080808;
      color: white;
      font-family: "Courier New", monospace;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      padding: 24px 16px;
      overflow: hidden;
    }

    .title {
      text-align: center;
      font-size: 24px;
      font-weight: 900;
      text-shadow: 3px 3px #d71920;
    }

    .subtitle {
      color: #ffd700;
      font-weight: 900;
      text-align: center;
      margin-top: 8px;
    }

    .playerNumber {
      font-size: 76px;
      font-weight: 900;
      color: #ffd700;
      text-shadow: 4px 4px #d71920;
    }

    #joystick {
      width: 260px;
      height: 260px;
      border-radius: 50%;
      border: 6px solid white;
      background: radial-gradient(circle, #222 0%, #111 60%, #000 100%);
      position: relative;
      box-shadow: 0 0 30px rgba(255,255,255,.2);
    }

    #stick {
      width: 96px;
      height: 96px;
      border-radius: 50%;
      background: #d71920;
      border: 5px solid white;
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      box-shadow: 0 0 20px rgba(215,25,32,.8);
    }

    #timingBtn {
      width: 100%;
      max-width: 340px;
      background: #ffd700;
      color: #111;
      border: 4px solid white;
      border-radius: 14px;
      padding: 18px;
      font-size: 20px;
      font-weight: 900;
      font-family: "Courier New", monospace;
      box-shadow: 4px 4px 0 #d71920;
    }

    .instructions {
      text-align: center;
      font-size: 15px;
      line-height: 1.35;
      max-width: 360px;
      opacity: .9;
    }
  </style>
</head>

<body>
  <div>
    <div class="title">🏃 TEAM-CLARITY</div>
    <div class="subtitle">PLAYER SIMULATOR CONTROLLER</div>
  </div>

  <div class="playerNumber" id="playerNumber">?</div>

  <div id="joystick">
    <div id="stick"></div>
  </div>

  <button id="timingBtn">CONFIRM TIMING</button>

  <div class="instructions">
    Move the stick to move your player during the rep.<br />
    Press timing when you arrive/execute.
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="simcontroller.js"></script>
</body>
</html>
